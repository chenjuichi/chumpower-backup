<svg
  xmlns="http://www.w3.org/2000/svg"
  width="300"
  height="80"
  viewBox="0 0 420 220"
  preserveAspectRatio="xMidYMid meet"
>
  <style>
    <!--
    .box {
      animation: moveBox 2.5s ease-in-out infinite;
    }
    -->
    .box {
      animation:
        moveBox
        var(--move-time)
        ease-in-out
        infinite;
    }

    .arrow {
      animation: arrowBlink 1.1s ease-in-out infinite;
    }

    .door {
      animation: doorOpen 2.5s ease-in-out infinite;
      transform-origin: 315px 105px;
    }

    .check {
      stroke-dasharray: 60;
      stroke-dashoffset: 60;
      animation: drawCheck 2.5s ease-in-out infinite;
    }
  <!--
    @keyframes moveBox {
      0%   { transform: translateX(0); opacity: 1; }
      55%  { transform: translateX(190px); opacity: 1; }
      72%  { transform: translateX(190px); opacity: 0; }
      100% { transform: translateX(0); opacity: 0; }
    }
  -->

  <!--
    @keyframes moveBox {
      0%   {
        transform: translateX(-320px);
        opacity: 1;
      }

      60%  {
        transform: translateX(520px);
        opacity: 1;
      }

      78%  {
        transform: translateX(520px);
        opacity: 0;
      }

      100% {
        transform: translateX(-320px);
        opacity: 0;
      }
    }
  -->
    @keyframes moveBox {

      0% {
        transform:
          translateX(var(--start-x));

        opacity: 1;
      }

      60% {
        transform:
          translateX(
            calc(
              var(--start-x)
              + var(--move-length)
            )
          );

        opacity: 1;
      }

      78% {
        transform:
          translateX(
            calc(
              var(--start-x)
              + var(--move-length)
            )
          );

        opacity: 0;
      }

      100% {
        transform:
          translateX(var(--start-x));

        opacity: 0;
      }
    }

    @keyframes arrowBlink {
      0%,100% { opacity: .3; }
      50% { opacity: 1; }
    }

    @keyframes doorOpen {
      0%,35% { transform: scaleX(1); }
      55%,80% { transform: scaleX(.2); }
      100% { transform: scaleX(1); }
    }

    @keyframes drawCheck {
      0%,55% { stroke-dashoffset: 60; opacity: 0; }
      75%,100% { stroke-dashoffset: 0; opacity: 1; }
    }
  </style>

  <!-- 背景 -->
  <rect width="420" height="220" rx="18" fill="#f4f7fb"/>

  <!-- 地板 -->
  <rect x="-300" y="170" width="720" height="8" rx="4" fill="#cfd8dc"/>

  <!-- 倉庫 -->
  <g>
    <!-- 主體 -->
    <rect x="255" y="50" width="120" height="120" rx="10" fill="#607d8b"/>

    <!-- 倉庫線條 -->
    <line x1="275" y1="50" x2="275" y2="170" stroke="#78909c" stroke-width="3"/>
    <line x1="295" y1="50" x2="295" y2="170" stroke="#78909c" stroke-width="3"/>
    <line x1="315" y1="50" x2="315" y2="170" stroke="#78909c" stroke-width="3"/>
    <line x1="335" y1="50" x2="335" y2="170" stroke="#78909c" stroke-width="3"/>

    <!-- 門 -->
    <rect x="290" y="90" width="50" height="80" rx="4" fill="#263238"/>
    <rect class="door" x="290" y="90" width="50" height="80" rx="4" fill="#90a4ae"/>

    <!-- 標題 -->
    <text x="315" y="78"
          text-anchor="middle"
          font-size="16"
          font-weight="700"
          fill="white">
      成品區
    </text>
  </g>

  <!-- 箭頭 -->
  <g class="arrow" fill="#1976d2">
    <rect x="145" y="113" width="78" height="12" rx="6"/>
    <polygon points="223,101 252,119 223,137"/>
  </g>

  <!-- 箱子 -->
  <g class="box">
    <rect x="-245" y="105" width="64" height="55"
          rx="5"
          fill="#ffb74d"
          stroke="#ef6c00"
          stroke-width="3"/>

    <line x1="-245" y1="125" x2="-181" y2="125"
          stroke="#ef6c00"
          stroke-width="3"/>

    <line x1="87" y1="105" x2="87" y2="160"
          stroke="#ef6c00"
          stroke-width="3"/>

    <text x="-213" y="145"
          text-anchor="middle"
          font-size="15"
          font-weight="700"
          fill="#5d4037">
      入庫
    </text>
  </g>

  <!-- 完成勾勾 -->
  <circle cx="345" cy="35" r="18" fill="#43a047"/>

  <path class="check"
        d="M336 35 L343 43 L356 27"
        fill="none"
        stroke="white"
        stroke-width="5"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- 底部文字 -->
  <text x="210" y="205"
        text-anchor="middle"
        font-size="18"
        font-weight="700"
        fill="#37474f">
    成品入庫中
  </text>
</svg>